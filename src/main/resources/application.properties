# Optional: log file rotation
logging.file.name=logs/crud-service.log
logging.file.max-size=50MB
logging.file.max-history=30

# Tracing configuration
management.tracing.sampling.probability=1.0

# Zipkin exporter configuration
management.export.zipkin.endpoint=http://localhost:9411/api/v2/spans
management.export.zipkin.service-name=crud-service
management.zipkin.tracing.enabled=false

# Logging pattern with traceId and spanId
#logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg traceId=%X{traceId} spanId=%X{spanId}%n

#spring.security.user.name=test
#spring.security.user.password=test

# 64 characters long for HS512
jwt.secret=${JWT_SECRET:z8mK7pQ2n4r6v9y$B&E)H@McQfTjWnZr4u7x!A%D*G-KaPdSgUkXp2s5v8y/B?E(}
jwt.expiration=3600000
spring.jackson.property-naming-strategy=SNAKE_CASE

# ===============================
# ACTUATOR CONFIG
# ===============================
management.endpoints.web.base-path=/actuator

# Expose required endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics

# Enable Prometheus endpoint
management.endpoint.prometheus.enabled=true

# Show full health details
management.endpoint.health.show-details=always

# ===============================
# METRICS CONFIG (MICROMETER)
# ===============================

# Enable all metrics
management.metrics.enable.all=true

# Add application tag (important for Grafana filtering)
management.metrics.tags.application=${spring.application.name}

# JVM metrics
management.metrics.enable.jvm=true

# HTTP metrics
management.metrics.enable.http=true

# Percentiles (latency tracking)
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# SLA boundaries (optional but useful)
management.metrics.distribution.sla.http.server.requests=100ms,200ms,500ms,1s,2s
# SECURITY (optional but recommended)
# management.endpoints.web.exposure.include=*

#mqtt
mqtt.broker-url=tcp://localhost:1883
mqtt.client-id=service-a
mqtt.user-name=admin
mqtt.password=admin
mqtt.qos=1
mqtt.topics=sensors/temperature, sensors/humidity
#messaging:
#provider: mqtt
logging.level.org.eclipse.paho=DEBUG


# TOPICS
kumar.messaging.topics.billing-event-listener.provider=gcp
kumar.messaging.topics.billing-event-listener.topic-id=projects/.../billing

kumar.messaging.topics.bulk-order-upload.provider=mqtt
kumar.messaging.topics.bulk-order-upload.topic-id=bulk/order/upload


# SUBSCRIPTIONS
kumar.messaging.subscriptions.bulk-order-upload.topic=bulk-order-upload
kumar.messaging.subscriptions.bulk-order-upload.subscription-id=sub-1

kumar.messaging.subscriptions.business-registration.topic=billing-event-listener
kumar.messaging.subscriptions.business-registration.subscription-id=sub-2


# ========================
# KAFKA BROKER
# ========================
spring.kafka.bootstrap-servers=localhost:9092

# ========================
# CONSUMER CONFIG
# ========================
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ========================
# PRODUCER CONFIG
# ========================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer


spring.jackson.serialization.fail-on-empty-beans=false
messaging.retry.max-retries=3
messaging.retry.base-delay-ms=1000
spring.profiles.active=dev
spring.config.import=classpath:application-messaging-dev.yml