spring.application.name=crud-api

spring.datasource.url=jdbc:h2:file:./data/testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=test
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#spring.jpa.hibernate.naming.physical-strategy=org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy

#debug
logging.level.root=INFO
#logging.level.org.springframework.web=DEBUG
logging.level.com.kumar.crudapi=DEBUG
#logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
#logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

#logging.pattern.level=%5p
#logging.pattern.console={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ}","level":"%5p","app":"${spring.application.name:}","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","message":"%m"}
#logging.file.name=logs/app.log
#logging.file.max-size=50MB
#logging.file.max-history=30

# Console logging with traceId & spanId
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%5p] [%X{traceId:-},%X{spanId:-}] [%c{1.}] %m%n

# File logging (optional)
logging.file.name=logs/fintech-service.log
logging.file.max-size=50MB
logging.file.max-history=30